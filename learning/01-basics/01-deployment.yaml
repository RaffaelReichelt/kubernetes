apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: learn-basics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: api-key
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: data
              mountPath: /data
      volumes:
        - name: html
          configMap:
            name: nginx-html
        - name: data
          persistentVolumeClaim:
            claimName: nginx-data
